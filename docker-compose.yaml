# Anchors
x-postgres-healthcheck: &postgres-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-airflow-build: &airflow-build
  build:
    context: .
    dockerfile: Dockerfile

x-airflow-env: &airflow-env
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER}:${POSTGRES_AIRFLOW_PASSWORD}@${POSTGRES_AIRFLOW_HOST}:${POSTGRES_AIRFLOW_PORT}/${POSTGRES_AIRFLOW_DB}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:Admin"
    PYTHONPATH: /opt/airflow/src
    AIRFLOW_HOME: /opt/airflow


x-airflow-volumes: &airflow-volumes
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./include:/opt/airflow/include
    - airflow_logs:/opt/airflow/logs
    - ./simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated

x-airflow-depends-on: &airflow-depends-on
  depends_on:
    pg_elt:
      condition: service_healthy
    pg_airflow:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  pg_elt:
    image: postgres:17-alpine
    container_name: pg_elt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_elt_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      <<: *postgres-healthcheck

  pg_airflow:
    image: postgres:17-alpine
    container_name: pg_airflow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_airflow_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_AIRFLOW_USER} -d ${POSTGRES_AIRFLOW_DB}" ]
      <<: *postgres-healthcheck

  airflow-init:
    <<: [ *airflow-build, *airflow-env, *airflow-volumes ]
    container_name: airflow_init
    restart: no
    depends_on:
      pg_airflow:
        condition: service_healthy
    command: airflow db migrate

  airflow-api-server:
    <<: [ *airflow-build, *airflow-env, *airflow-depends-on, *airflow-volumes ]
    container_name: airflow_api_server
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: airflow api-server

  airflow-scheduler:
    <<: [ *airflow-build, *airflow-env, *airflow-depends-on, *airflow-volumes ]
    container_name: airflow_scheduler
    restart: unless-stopped
    command: airflow scheduler

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"    # API S3
      - "9001:9001"    # Console web — http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest       # mc = MinIO Client
    container_name: minio_init
    env_file: .env
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        echo 'Bucket ${MINIO_BUCKET} is ready to use.'
      "

volumes:
  pg_elt_volume:
    name: pg_elt_volume
  pg_airflow_volume:
    name: pg_airflow_volume
  airflow_logs:
    name: airflow_logs
  minio_data:
    name: minio_data