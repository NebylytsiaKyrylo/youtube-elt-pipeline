# uv run soda scan -d yt_dwh -c soda/configuration.yml soda/checks_staging.yml
checks for staging.yt_video_snapshot:
  - staging_vs_yesterday_fact_ratio > 0.95:
      staging_vs_yesterday_fact_ratio query: |
        SELECT
          COALESCE(COUNT(*)::NUMERIC / NULLIF((
                                            SELECT COUNT(*)
                                            FROM core.fct_video_daily_snapshot
                                            WHERE snapshot_date = '${ds}'::DATE - INTERVAL '1 day'
                                        ), 0), 1.0)
        FROM staging.yt_video_snapshot
  - missing_count(video_id) = 0
  - missing_count(channel_id) = 0
  - missing_count(channel_name) = 0
  - missing_count(channel_start_date) = 0
  - missing_count(title) = 0
  - missing_count(published_at) = 0
  - missing_count(duration_iso) = 0
  - duplicate_count(video_id) = 0