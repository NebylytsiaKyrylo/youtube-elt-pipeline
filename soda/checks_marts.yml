# uv run soda scan -d yt_dwh -c soda/configuration.yml soda/checks_marts.yml
checks for marts.mart_channel_engagement_active:
  - row_count > 0
  - min(engagement_score) >= 0
  - max(engagement_score) <= 2
  - min(channel_age_years) >= 0

checks for marts.mart_channel_latest_videos:
  - row_count > 0
  - min(days_since_last_video) >= 0

checks for marts.mart_channel_retention:
  - row_count > 0
  - min(engagement_score) >= 0
  - max(engagement_score) <= 2
  - max(retention_score) <= 1
  - min(retention_score) >= 0

checks for marts.mart_channel_size_distribution:
  - row_count > 0
  - min(avg_engagement_score) >= 0
  - max(avg_engagement_score) <= 2

checks for marts.mart_channel_subscribers_vs_engagement:
  - row_count > 0
  - min(engagement_score) >= 0
  - max(engagement_score) <= 2
  - min(engagement_per_subscriber) >= 0

checks for marts.mart_channel_top_likes_rate:
  - row_count > 0
  - min(likes_rate) >= 0
  - max(likes_rate) <= 1

checks for marts.mart_channel_top_subscribers:
  - row_count > 0

checks for marts.mart_channel_top_views:
  - row_count > 0

checks for marts.mart_video_format_engagement:
  - row_count > 0
  - min(avg_engagement_score) >= 0
  - max(avg_engagement_score) <= 2

checks for marts.mart_video_top_views:
  - row_count > 0