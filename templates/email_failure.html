<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @media (max-width: 600px) {
      .container { padding: 16px !important; }
      .header { padding: 20px 16px !important; }
      h1 { font-size: 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Arial,sans-serif;">
  <div class="container" style="max-width:600px;margin:32px auto;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

    <div class="header" style="background-color:#dc2626;padding:28px 32px;">
      <h1 style="margin:0;color:#ffffff;font-size:22px;">Pipeline failure</h1>
      <p style="margin:8px 0 0;color:#fecaca;font-size:14px;">A task encountered an error</p>
    </div>

    <div style="padding:28px 32px;">
      <table style="width:100%;border-collapse:collapse;">
        <tr>
          <td style="padding:10px 0;color:#6b7280;font-size:13px;width:40%;">DAG</td>
          <td style="padding:10px 0;color:#111827;font-size:13px;font-weight:bold;">{{ dag.dag_id }}</td>
        </tr>
        <tr style="border-top:1px solid #f3f4f6;">
          <td style="padding:10px 0;color:#6b7280;font-size:13px;">Task</td>
          <td style="padding:10px 0;color:#111827;font-size:13px;font-weight:bold;">{{ task.task_id }}</td>
        </tr>
        <tr style="border-top:1px solid #f3f4f6;">
          <td style="padding:10px 0;color:#6b7280;font-size:13px;">Execution date</td>
          <td style="padding:10px 0;color:#111827;font-size:13px;">{{ ds }}</td>
        </tr>
      </table>

      <div style="margin-top:24px;">
        <p style="margin:0 0 8px;color:#6b7280;font-size:13px;font-weight:bold;">Error</p>
        <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:14px 16px;">
          <p style="margin:0;color:#991b1b;font-size:13px;font-family:monospace;word-break:break-word;">{{ exception }}</p>
        </div>
      </div>
    </div>

    <div style="padding:16px 32px;background:#f9fafb;border-top:1px solid #e5e7eb;">
      <p style="margin:0;color:#9ca3af;font-size:12px;">Airflow — yt_elt_pipeline</p>
    </div>

  </div>
</body>
</html>
